<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente · Buscar por Facultad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="sp-navbar">
    <div class="container">
        <a class="sp-brand" href="/docente/dashboard">
            <span class="brand-dot"><i class="fas fa-chalkboard-user"></i></span>
            Panel Docente
        </a>
        <div class="sp-nav-right">
            <span class="navbar-page-title"><i class="fas fa-building-columns me-1"></i>Buscar por Facultad</span>
            <a href="/docente/dashboard" class="sp-btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
            <a href="/logout" class="sp-btn-logout"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </div>
</nav>

<div class="container sp-page">
    <div class="sp-section-header">
        <h2><i class="fas fa-building-columns" style="color:var(--accent)"></i> Buscar Estudiantes por Facultad</h2>
        <p>Selecciona una facultad para ver todos sus estudiantes y resultados.</p>
    </div>

    <!-- Selector -->
    <div class="sp-panel" style="margin-bottom:1.5rem;">
        <div class="sp-panel-body">
            <form action="/docente/buscar-facultad" method="post">
                <div style="display:flex;gap:.75rem;align-items:flex-end;">
                    <div style="flex:1">
                        <label style="display:block;margin-bottom:.4rem;font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">
                            Facultad
                        </label>
                        <select name="facultad" class="sp-select" required>
                            <option value="">— Seleccione una facultad —</option>
                            <option th:each="f : ${facultades}"
                                    th:value="${f.nombre}"
                                    th:text="${f.nombre}"
                                    th:selected="${f.nombre == facultadSeleccionada}"></option>
                        </select>
                    </div>
                    <button type="submit" class="sp-btn sp-btn-primary" style="padding:.65rem 1.5rem;">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Resultados -->
    <div th:if="${resultados != null}">
        <div class="sp-panel">
            <div class="sp-panel-header">
                <i class="fas fa-users" style="color:#4ade80"></i>
                Resultados · Facultad: <span style="color:var(--text);margin-left:.3rem;" th:text="${facultadSeleccionada}"></span>
            </div>

            <div th:if="${#lists.isEmpty(resultados)}">
                <div class="sp-empty" style="padding:2.5rem">
                    <i class="fas fa-inbox"></i>
                    <p>No hay estudiantes registrados en esta facultad.</p>
                </div>
            </div>

            <div class="sp-table-wrap" th:unless="${#lists.isEmpty(resultados)}">
                <table class="sp-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Cédula</th>
                            <th>Programa</th>
                            <th>Puntaje Global</th>
                            <th>Nivel</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${resultados}">
                            <td th:text="${item.alumno.nombre}"></td>
                            <td><span class="sp-badge sp-badge-muted" th:text="${item.alumno.cedula}"></span></td>
                            <td th:text="${item.alumno.programa}"></td>
                            <td>
                                <span th:if="${item.resultado != null}"
                                      class="sp-badge sp-badge-indigo"
                                      th:text="${item.resultado.puntajeGlobal}"></span>
                                <span th:unless="${item.resultado != null}"
                                      class="sp-badge sp-badge-muted">Sin resultados</span>
                            </td>
                            <td>
                                <span th:if="${item.resultado != null}"
                                      class="sp-badge sp-badge-info"
                                      th:text="${item.resultado.nivelDesempeno}"></span>
                                <span th:unless="${item.resultado != null}">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
